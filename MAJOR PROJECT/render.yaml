services:
  - type: web
    name: cinematch-recommender
    env: python
    buildCommand: "pip install -r requirements.txt && python train_model.py"
    startCommand: "gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0
